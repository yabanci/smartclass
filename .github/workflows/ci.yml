name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────── Frontend ─────────────
  frontend:
    name: Frontend · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --force

      - name: Unit tests
        run: npx vitest run --reporter=default

      - name: Build
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ───────────── Backend ─────────────
  backend:
    name: Backend · vet · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Unit tests (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Build
        run: go build -trimpath -o bin/server ./cmd/server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-server
          path: backend/bin/server
          retention-days: 7

  # ───────────── Mobile (Flutter / Android) ─────────────
  mobile:
    name: Mobile · analyze · test · build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Unit tests
        run: flutter test --reporter expanded

      - name: Build APK (release, debug-signed)
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartclass-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ───────────── Docker images (build only, no push) ─────────────
  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [frontend, backend, mobile]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: smartclass-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: smartclass-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
