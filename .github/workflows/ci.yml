name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────── Backend ─────────────
  backend:
    name: Backend · vet · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      # Security/lint scanners. Each is a separate step so one failing tool
      # doesn't mask the rest. All five (vet, golangci-lint, staticcheck,
      # govulncheck, gosec) are kept blocking — any new finding fails the build.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          working-directory: backend
          args: --timeout=5m

      # staticcheck is already executed by golangci-lint above using the
      # version bundled in golangci-lint-action v7 (currently 2025.1.x, Go 1.25
      # compatible). The standalone step is intentionally absent — running it
      # again with a different pinned version causes false-fails on Go 1.25
      # constant-folding changes upstream.

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

      - name: Unit tests (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: hass slow tests (build tag)
        run: go test -tags=slow -race -count=1 ./internal/hass/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Coverage gate
        # Threshold: current coverage (31%) minus 3% ratchet = 28%.
        # Bump this value as the test suite grows. See
        # docs/superpowers/specs/2026-05-01-test-coverage-design.md for the rationale.
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$NF); print int($NF)}')
          echo "Total coverage: $pct%"
          if [ -z "$pct" ]; then
            echo "::error::could not parse coverage from coverage.out"
            exit 1
          fi
          if [ "$pct" -lt 28 ]; then
            echo "::error::Total coverage $pct% is below threshold 28%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 14

      - name: Build
        run: go build -trimpath -o bin/server ./cmd/server

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: backend-server
          path: backend/bin/server
          retention-days: 7

  # ───────────── Backend integration tests (Testcontainers + real Postgres) ─────────────
  integration:
    name: Backend · integration tests
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest GitHub runners by default.
    # Run in parallel with mobile; docker job still needs both backend & mobile.
    needs: []
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Integration tests (race, real Postgres via Testcontainers)
        run: go test -tags=integration -race -count=1 ./...
        env:
          INTEGRATION_TESTS: "1"
          # Testcontainers uses the Docker socket exposed by the runner.
          DOCKER_HOST: unix:///var/run/docker.sock

  # ───────────── Mobile (Flutter / Android) ─────────────
  mobile:
    name: Mobile · analyze · test · build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit tests (with coverage)
        run: flutter test --reporter expanded --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          retention-days: 14

      - name: Coverage gate
        run: |
          sudo apt-get install -y --no-install-recommends lcov
          summary=$(lcov --summary coverage/lcov.info 2>&1)
          echo "$summary"
          # lcov line format: "  lines......: 14.8% (593 of 4018 lines)"
          # — the percent is $2, not $NF (which is "lines)").
          pct=$(echo "$summary" | awk '/lines\.\.+/{gsub("%","",$2); print int($2)}')
          if [ -z "$pct" ]; then
            echo "::error::could not parse line coverage from lcov.info"
            exit 1
          fi
          echo "Total line coverage: $pct%"
          # Initial floor at 10% (current ~15%). Ratchet up as test suite grows.
          if [ "$pct" -lt 10 ]; then
            echo "::error::Mobile line coverage $pct% is below threshold 10%"
            exit 1
          fi

      - name: Build APK (release, debug-signed)
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: smartclass-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ───────────── Docker images (build only, no push) ─────────────
  docker:
    name: Docker · build backend image
    runs-on: ubuntu-latest
    needs: [backend, mobile, integration]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # docker/build-push-action@v7.1.0
        with:
          context: ./backend
          push: false
          # load=true exports the build result into the local docker daemon
          # so the trivy scan step can find smartclass-backend:ci.
          load: true
          tags: smartclass-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: smartclass-backend:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: smartclass-backend:ci
          format: cyclonedx
          output: sbom.cyclonedx.json
          exit-code: '0'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: sbom.cyclonedx.json
          retention-days: 90
