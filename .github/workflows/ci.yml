name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────── Backend ─────────────
  backend:
    name: Backend · vet · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      # Security/lint scanners. Each is a separate step so one failing tool
      # doesn't mask the rest. All five (vet, golangci-lint, staticcheck,
      # govulncheck, gosec) are kept blocking — any new finding fails the build.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.5.0
          working-directory: backend
          args: --timeout=5m

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

      - name: Unit tests (race + coverage)
        run: go test ./... -count=1 -race -coverprofile=coverage.out -covermode=atomic

      - name: hass slow tests (build tag)
        run: go test -tags=slow -race -count=1 ./internal/hass/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - name: Coverage gate
        # Threshold inline; bump as test coverage grows. See
        # docs/superpowers/specs/2026-05-01-test-coverage-design.md for the rationale.
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$NF); print int($NF)}')
          echo "Total coverage: $pct%"
          if [ -z "$pct" ]; then
            echo "::error::could not parse coverage from coverage.out"
            exit 1
          fi
          if [ "$pct" -lt 30 ]; then
            echo "::error::Total coverage $pct% is below threshold 30%"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 14

      - name: Build
        run: go build -trimpath -o bin/server ./cmd/server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-server
          path: backend/bin/server
          retention-days: 7

  # ───────────── Backend integration tests (Testcontainers + real Postgres) ─────────────
  integration:
    name: Backend · integration tests
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest GitHub runners by default.
    # Run in parallel with mobile; docker job still needs both backend & mobile.
    needs: []
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Integration tests (race, real Postgres via Testcontainers)
        run: go test -tags=integration -race -count=1 ./...
        env:
          INTEGRATION_TESTS: "1"
          # Testcontainers uses the Docker socket exposed by the runner.
          DOCKER_HOST: unix:///var/run/docker.sock

  # ───────────── Mobile (Flutter / Android) ─────────────
  mobile:
    name: Mobile · analyze · test · build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit tests (with coverage)
        run: flutter test --reporter expanded --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          retention-days: 14

      - name: Build APK (release, debug-signed)
        run: flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartclass-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ───────────── Docker images (build only, no push) ─────────────
  docker:
    name: Docker · build backend image
    runs-on: ubuntu-latest
    needs: [backend, mobile, integration]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: smartclass-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
