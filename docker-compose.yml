services:
  postgres:
    image: postgres:16-alpine
    container_name: smartclass-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      POSTGRES_DB: ${POSTGRES_DB:-smartclass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartclass} -d ${POSTGRES_DB:-smartclass}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartclass]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartclass-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 -E >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks: [smartclass]

  # One-shot init: drops Xiaomi's official HA custom component into the HA
  # config volume before HA starts. Needed because the legacy `xiaomi_miio`
  # cloud login is broken on current Xiaomi auth API (2025+) and returns
  # `cloud_login_error`. The new `xiaomi_home` integration from github.com/XiaoMi
  # uses OAuth and actually works. Idempotent — skips re-install if present.
  ha-init:
    image: alpine:3.19
    container_name: smartclass-hass-init
    volumes:
      - hass-config:/config
    # NOTE: uses the LITERAL (|) block scalar so newlines + `#` comments stay
    # intact. The previous folded-scalar form collapsed the script to a single
    # line, which made the `#` comments swallow the second `if … then` and
    # caused `sh: syntax error: unexpected "fi"`.
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache curl tar >/dev/null
        mkdir -p /config/custom_components
        if [ ! -d /config/custom_components/xiaomi_home ]; then
          echo "Installing xiaomi_home custom component..."
          cd /tmp
          curl -sL https://github.com/XiaoMi/ha_xiaomi_home/archive/refs/heads/main.tar.gz | tar xz
          mv ha_xiaomi_home-main/custom_components/xiaomi_home /config/custom_components/
          rm -rf ha_xiaomi_home-main
          echo "xiaomi_home installed"
        else
          echo "xiaomi_home already present, skipping"
        fi
        # Xiaomi's OAuth client (client_id=2882303761520251711) whitelists ONLY
        # `http://homeassistant.local:8123` as a valid redirect_uri. Any other
        # host (localhost, 127.0.0.1, LAN IP) returns `invalid redirect uri` on
        # account.xiaomi.com. We keep the const.py default unchanged, but
        # unlock the form field in config_flow.py (the stock integration pins
        # it to `vol.In([OAUTH_REDIRECT_URL])`, a single-value dropdown with no
        # way to override). After this patch the user can type a custom URL if
        # they've pointed a whitelisted hostname at their HA.
        # On Docker Desktop (Windows/macOS) the fix is a hosts-file entry:
        #   127.0.0.1 homeassistant.local
        # so the browser resolves the default redirect back to the local HA.
        # See README for platform-specific steps.
        if [ -f /config/custom_components/xiaomi_home/config_flow.py ]; then
          sed -i 's|vol.In(\[OAUTH_REDIRECT_URL\])|str|g' \
            /config/custom_components/xiaomi_home/config_flow.py
          echo "xiaomi_home oauth_redirect_url field unlocked (free text)"
        fi
        # Undo any earlier (failed) attempt that pinned the const default to
        # localhost — Xiaomi's OAuth only whitelists homeassistant.local, so
        # leaving the patched value in place would show an invalid-redirect
        # error page on first open.
        if [ -f /config/custom_components/xiaomi_home/miot/const.py ]; then
          sed -i 's|http://localhost:8123|http://homeassistant.local:8123|g' \
            /config/custom_components/xiaomi_home/miot/const.py
          echo "xiaomi_home OAUTH_REDIRECT_URL reverted to homeassistant.local"
        fi
    restart: "no"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: smartclass-hass
    volumes:
      - hass-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${HA_PORT:-8123}:8123"
    depends_on:
      mosquitto:
        condition: service_healthy
      ha-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [smartclass]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartclass-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-smartclass}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      DB_NAME: ${POSTGRES_DB:-smartclass}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes-long}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      BCRYPT_COST: "10"
      RATE_LIMIT_RPS: "50"
      CORS_ORIGINS: "*"
      MIGRATIONS_DIR: /app/migrations
      I18N_DIR: /app/locales
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks: [smartclass]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartclass-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks: [smartclass]
    restart: unless-stopped

volumes:
  postgres-data:
  hass-config:
  mosquitto-data:
  mosquitto-log:

networks:
  smartclass:
    driver: bridge
