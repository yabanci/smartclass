services:
  postgres:
    image: postgres:16-alpine
    container_name: smartclass-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      POSTGRES_DB: ${POSTGRES_DB:-smartclass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartclass} -d ${POSTGRES_DB:-smartclass}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartclass]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartclass-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 2 -E >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks: [smartclass]

  # One-shot init: drops Xiaomi's official HA custom component into the HA
  # config volume before HA starts. Needed because the legacy `xiaomi_miio`
  # cloud login is broken on current Xiaomi auth API (2025+) and returns
  # `cloud_login_error`. The new `xiaomi_home` integration from github.com/XiaoMi
  # uses OAuth and actually works. Idempotent — skips re-install if present.
  ha-init:
    image: alpine:3.19
    container_name: smartclass-hass-init
    volumes:
      - hass-config:/config
    # NOTE: uses the LITERAL (|) block scalar so newlines + `#` comments stay
    # intact. The previous folded-scalar form collapsed the script to a single
    # line, which made the `#` comments swallow the second `if … then` and
    # caused `sh: syntax error: unexpected "fi"`.
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache curl tar >/dev/null
        mkdir -p /config/custom_components
        # Pin to a known-stable tag (v0.4.4) instead of main — main has had
        # intermittent regressions in OAuth/webhook handling. A version sentinel
        # lets us force-reinstall on bumps without nuking the whole volume, and
        # also wipes the stale .storage/xiaomi_home state that accumulates from
        # failed OAuth attempts (corruption there is a common root cause of
        # `task_oauth exception, invalid params` on retries).
        XH_VERSION="v0.4.4"
        SENTINEL="/config/custom_components/xiaomi_home/.installed_version"
        CURRENT="$$(cat "$$SENTINEL" 2>/dev/null || true)"
        if [ "$$CURRENT" != "$$XH_VERSION" ]; then
          echo "Installing xiaomi_home $$XH_VERSION (was: $${CURRENT:-none})..."
          rm -rf /config/custom_components/xiaomi_home
          rm -f /config/.storage/xiaomi_home* 2>/dev/null || true
          cd /tmp
          rm -rf ha_xiaomi_home-*
          curl -sL "https://github.com/XiaoMi/ha_xiaomi_home/archive/refs/tags/$${XH_VERSION}.tar.gz" | tar xz
          SRC_DIR="ha_xiaomi_home-$${XH_VERSION#v}"
          mv "$${SRC_DIR}/custom_components/xiaomi_home" /config/custom_components/
          rm -rf "$${SRC_DIR}"
          echo "$$XH_VERSION" > "$$SENTINEL"
          echo "xiaomi_home $$XH_VERSION installed (stale .storage purged)"
        else
          echo "xiaomi_home $$XH_VERSION already present, skipping"
        fi
        # Xiaomi's OAuth client whitelists ONLY `http://homeassistant.local:8123`
        # as redirect_uri. const.py ships with that value; if an older version
        # of this script mutated it to `localhost`, restore it — otherwise the
        # authorize step shows "invalid redirect uri" and the token-exchange
        # step sends a mismatched redirect_uri back to Xiaomi's `/get_token`,
        # which answers `code != 0` → surfaces to us as "invalid params".
        # On Docker Desktop (Windows/macOS) the user still needs the hosts
        # entry `127.0.0.1 homeassistant.local` so the browser can follow the
        # redirect back to this container. See README for platform-specific
        # steps.
        if [ -f /config/custom_components/xiaomi_home/miot/const.py ]; then
          sed -i 's|http://localhost:8123|http://homeassistant.local:8123|g' \
            /config/custom_components/xiaomi_home/miot/const.py
        fi
    restart: "no"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: smartclass-hass
    volumes:
      - hass-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${HA_PORT:-8123}:8123"
    # Explicit DNS — on Docker Desktop (Windows/macOS) the embedded resolver is
    # occasionally flaky for Xiaomi's OAuth host (`*.ha.api.io.mi.com`). Failed
    # DNS lookups there surface as `task_oauth exception, invalid params` because
    # `get_access_token_async` catches the aiohttp error and stringifies it.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      mosquitto:
        condition: service_healthy
      ha-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [smartclass]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartclass-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-smartclass}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      DB_NAME: ${POSTGRES_DB:-smartclass}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes-long}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      BCRYPT_COST: "10"
      RATE_LIMIT_RPS: "50"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}"
      HASS_URL: "http://homeassistant:8123"
      HASS_OWNER_PASSWORD: "${HASS_OWNER_PASSWORD:-smartclass1234}"
      MIGRATIONS_DIR: /app/migrations
      I18N_DIR: /app/locales
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks: [smartclass]
    restart: unless-stopped

volumes:
  postgres-data:
  hass-config:
  mosquitto-data:
  mosquitto-log:

networks:
  smartclass:
    driver: bridge
