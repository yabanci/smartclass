services:
  postgres:
    image: postgres:16-alpine
    container_name: smartclass-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      POSTGRES_DB: ${POSTGRES_DB:-smartclass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartclass} -d ${POSTGRES_DB:-smartclass}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [smartclass]

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartclass-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    restart: unless-stopped
    networks: [smartclass]

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: smartclass-hass
    volumes:
      - hass-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${HA_PORT:-8123}:8123"
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks: [smartclass]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartclass-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-smartclass}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
      DB_NAME: ${POSTGRES_DB:-smartclass}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-bytes-long}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 720h
      BCRYPT_COST: "10"
      RATE_LIMIT_RPS: "50"
      CORS_ORIGINS: "*"
      MIGRATIONS_DIR: /app/migrations
      I18N_DIR: /app/locales
    ports:
      - "${HTTP_PORT:-8080}:8080"
    networks: [smartclass]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartclass-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks: [smartclass]
    restart: unless-stopped

volumes:
  postgres-data:
  hass-config:
  mosquitto-data:
  mosquitto-log:

networks:
  smartclass:
    driver: bridge
