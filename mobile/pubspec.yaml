name: smartclass
description: Smart Classroom mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  dio: ^5.7.0
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  flutter_secure_storage: ^9.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.1
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
