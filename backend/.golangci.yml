version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
    - bodyclose
    - rowserrcheck
    - sqlclosecheck

  settings:
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1003"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      # G104 (unhandled errors from io.Closer etc.) suppressed only in tests.
      # Production code must handle all errors — G104 is enforced there.
      - path: _test\.go
        text: "G104"
        linters:
          - gosec

issues:
  max-same-issues: 0
  max-issues-per-linter: 0

run:
  timeout: 5m
